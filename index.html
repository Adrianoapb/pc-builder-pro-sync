<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PC Builder" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="description" content="Orçamento de hardware e montagem de PCs offline" />
  <title>PC Builder Pro</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <!-- CSS Principal -->
  <link rel="stylesheet" href="css/style.css" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ===================== SPLASH SCREEN ===================== -->
<div id="splash-screen">
  <div class="splash-content">
    <div class="splash-icon">
      <i class="fas fa-microchip"></i>
    </div>
    <h1 class="splash-title">PC Builder Pro</h1>
    <p class="splash-subtitle">Orçamento de Hardware</p>
    <div class="splash-loader">
      <div class="splash-progress"></div>
    </div>
  </div>
</div>

<!-- ===================== APP WRAPPER ===================== -->
<div id="app" class="app-wrapper" style="display:none;">

  <!-- ===================== SIDEBAR ===================== -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <i class="fas fa-microchip"></i>
        <span>PC Builder Pro</span>
      </div>
      <button id="sidebar-close" class="sidebar-close-btn" aria-label="Fechar menu">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard">
        <i class="fas fa-home"></i>
        <span>Dashboard</span>
      </a>
      <a href="#" class="nav-item" data-page="builds">
        <i class="fas fa-layer-group"></i>
        <span>Builds</span>
        <span class="nav-badge" id="builds-badge"></span>
      </a>
      <a href="#" class="nav-item" data-page="parts">
        <i class="fas fa-puzzle-piece"></i>
        <span>Peças</span>
        <span class="nav-badge" id="parts-badge"></span>
      </a>
      <a href="#" class="nav-item" data-page="comparator">
        <i class="fas fa-balance-scale"></i>
        <span>Comparador</span>
      </a>
      <a href="#" class="nav-item" data-page="shopping">
        <i class="fas fa-shopping-cart"></i>
        <span>Lista de Compras</span>
        <span class="nav-badge pending" id="shopping-badge"></span>
      </a>
      <a href="#" class="nav-item" data-page="reports">
        <i class="fas fa-chart-bar"></i>
        <span>Relatórios</span>
      </a>
      <div class="nav-divider"></div>
      <a href="#" class="nav-item" data-page="settings">
        <i class="fas fa-cog"></i>
        <span>Configurações</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-version">v1.0.0 • Offline</div>
      <div class="sidebar-storage" id="storage-info"></div>
    </div>
  </aside>

  <!-- Overlay para mobile -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- ===================== MAIN CONTENT ===================== -->
  <div class="main-wrapper">

    <!-- ===================== TOP BAR ===================== -->
    <header class="topbar">
      <div class="topbar-left">
        <button id="menu-toggle" class="menu-toggle" aria-label="Abrir menu">
          <i class="fas fa-bars"></i>
        </button>
        <h2 class="page-title" id="page-title">Dashboard</h2>
      </div>
      <div class="topbar-right">
        <button class="btn-icon" id="theme-toggle" title="Alternar tema">
          <i class="fas fa-moon" id="theme-icon"></i>
        </button>
        <button class="btn-icon" id="search-btn" title="Buscar">
          <i class="fas fa-search"></i>
        </button>
        <button class="btn-primary topbar-action" id="main-action-btn" style="display:none;">
          <i class="fas fa-plus"></i>
          <span id="main-action-text">Novo</span>
        </button>
      </div>
    </header>

    <!-- ===================== BUSCA GLOBAL ===================== -->
    <div id="global-search" class="global-search" style="display:none;">
      <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="global-search-input" placeholder="Buscar peças, builds, marcas..." autocomplete="off" />
        <button id="search-close" class="search-close"><i class="fas fa-times"></i></button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>

    <!-- ===================== PAGES ===================== -->
    <main class="content-area">

      <!-- ===== DASHBOARD ===== -->
      <section id="page-dashboard" class="page active" data-page="dashboard"></section>

      <!-- ===== BUILDS ===== -->
      <section id="page-builds" class="page" data-page="builds"></section>

      <!-- ===== PARTS ===== -->
      <section id="page-parts" class="page" data-page="parts"></section>

      <!-- ===== COMPARATOR ===== -->
      <section id="page-comparator" class="page" data-page="comparator"></section>

      <!-- ===== SHOPPING ===== -->
      <section id="page-shopping" class="page" data-page="shopping"></section>

      <!-- ===== REPORTS ===== -->
      <section id="page-reports" class="page" data-page="reports"></section>

      <!-- ===== SETTINGS ===== -->
      <section id="page-settings" class="page" data-page="settings"></section>

    </main>
  </div>
</div>

<!-- ===================== MODALS ===================== -->
<!-- Modal genérico -->
<div id="modal-overlay" class="modal-overlay" style="display:none;">
  <div id="modal-container" class="modal-container">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" id="modal-close-btn"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ===================== TOAST NOTIFICATIONS ===================== -->
<div id="toast-container" class="toast-container"></div>

<!-- ===================== PWA INSTALL BANNER ===================== -->
<div id="pwa-banner" class="pwa-banner" style="display:none;">
  <div class="pwa-banner-content">
    <i class="fas fa-download pwa-icon"></i>
    <div>
      <strong>Instalar PC Builder Pro</strong>
      <small>Acesso rápido e offline</small>
    </div>
    <div class="pwa-actions">
      <button id="pwa-install-btn" class="btn-primary btn-sm">Instalar</button>
      <button id="pwa-dismiss-btn" class="btn-ghost btn-sm"><i class="fas fa-times"></i></button>
    </div>
  </div>
</div>

<!-- ===================== SCRIPTS ===================== -->
<script src="js/icon-generator.js"></script>
<script src="js/db.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/builds.js"></script>
<script src="js/parts.js"></script>
<script src="js/comparator.js"></script>
<script src="js/shopping.js"></script>
<script src="js/reports.js"></script>
<script src="js/settings.js"></script>
<script src="js/app.js"></script>

</body>
</html>
