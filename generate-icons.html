<!DOCTYPE html>
<html>
<head><title>Gerar Ícones PWA</title></head>
<body>
<canvas id="c"></canvas>
<div id="links"></div>
<script>
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
const links = document.getElementById('links');

sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#6366f1');
  grad.addColorStop(1, '#8b5cf6');
  ctx.fillStyle = grad;

  // Rounded rect
  const r = size * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // CPU icon
  const unit = size / 10;
  const cx = size / 2;
  const cy = size / 2;
  const sq = size * 0.35;

  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(cx - sq/2, cy - sq/2, sq, sq);

  ctx.strokeStyle = 'white';
  ctx.lineWidth = size * 0.04;
  ctx.strokeRect(cx - sq/2, cy - sq/2, sq, sq);

  // Pins
  const pinLen = size * 0.1;
  const pinW = size * 0.03;
  const pinCount = 4;
  const spacing = sq / (pinCount + 1);

  ctx.fillStyle = 'white';
  for (let i = 1; i <= pinCount; i++) {
    // Top
    ctx.fillRect(cx - sq/2 + spacing*i - pinW/2, cy - sq/2 - pinLen, pinW, pinLen);
    // Bottom
    ctx.fillRect(cx - sq/2 + spacing*i - pinW/2, cy + sq/2, pinW, pinLen);
    // Left
    ctx.fillRect(cx - sq/2 - pinLen, cy - sq/2 + spacing*i - pinW/2, pinLen, pinW);
    // Right
    ctx.fillRect(cx + sq/2, cy - sq/2 + spacing*i - pinW/2, pinLen, pinW);
  }

  // Center text
  ctx.fillStyle = 'white';
  ctx.font = `bold ${size * 0.18}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PC', cx, cy);

  const dataUrl = canvas.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = `icon-${size}.png`;
  a.textContent = `Download icon-${size}.png`;
  a.style.display = 'block';
  links.appendChild(a);
});

// Auto-download all
setTimeout(() => {
  document.querySelectorAll('#links a').forEach((a, i) => {
    setTimeout(() => a.click(), i * 200);
  });
}, 500);
</script>
</body>
</html>
